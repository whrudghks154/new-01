<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>관리자 로그인 | 레드빈디자인</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="style.css">
  <script src="admin-login.js" defer></script>
  <style>
    .admin-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 18px;
      background: #050505;
    }

    .admin-box {
      width: min(100%, 420px);
      padding: 32px;
      background: var(--panel);
      border: 1px solid var(--line);
    }

    .admin-box h1 {
      margin-bottom: 24px;
      font-size: 34px;
    }

    .admin-form {
      display: grid;
      gap: 16px;
    }

    .admin-form label {
      display: grid;
      gap: 8px;
      color: var(--silver);
      font-weight: 800;
    }

    .admin-form input {
      min-height: 48px;
      padding: 0 14px;
      border: 1px solid var(--line);
      background: #0b0b0d;
      color: var(--text);
      font: inherit;
    }

    .admin-message {
      min-height: 22px;
      color: #ff7b86;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="admin-page">
    <section class="admin-box">
      <p class="eyebrow">PAYMENT ADMIN</p>
      <h1>관리자 로그인</h1>
      <form class="admin-form" id="admin-login-form">
        <label>
          비밀번호
          <input id="admin-password" name="password" type="password" autocomplete="current-password" required>
        </label>
        <button class="btn primary" type="submit">로그인</button>
        <p class="admin-message" id="admin-message" role="alert"></p>
      </form>
    </section>
  </main>
</body>
</html>
